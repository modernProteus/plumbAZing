<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thank You | PlumbAZing</title>
    <meta
      name="description"
      content="Thanks for booking with PlumbAZing. We'll be in touch shortly."
    />

    <style>
      :root {
        --blue: #0b3d91;
        --red: #c1121f;
        --ink: #0f172a;
        --muted: #475569;
        --bg: #ffffff;
        --card: #f8fafc;
        --line: #e2e8f0;
        --shadow: 0 10px 30px rgba(2, 8, 23, 0.08);
        --radius: 18px;
        --max: 860px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--ink);
        background: radial-gradient(
            1200px 260px at 20% 20%,
            rgba(11, 61, 145, 0.14),
            transparent 60%
          ),
          radial-gradient(
            900px 240px at 80% 10%,
            rgba(193, 18, 31, 0.12),
            transparent 60%
          ),
          linear-gradient(180deg, #ffffff, #f8fafc);
        line-height: 1.45;
        padding: 24px;
      }

      .wrap {
        width: 100%;
        max-width: var(--max);
      }

      .card {
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(2, 8, 23, 0.08);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 32px 24px;
        text-align: center;
      }

      .logo {
        width: min(240px, 60vw);
        height: auto;
        display: block;
        margin: 0 auto 20px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(11, 61, 145, 0.07);
        border: 1px solid rgba(11, 61, 145, 0.14);
        color: var(--blue);
        font-weight: 900;
        font-size: 14px;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: clamp(32px, 5vw, 46px);
        line-height: 1.05;
        letter-spacing: -0.6px;
      }

      p {
        margin: 0 auto;
        max-width: 38rem;
        color: var(--muted);
        font-size: 18px;
      }

      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 26px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        border-radius: 999px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 850;
        letter-spacing: 0.2px;
      }

      .btn.primary {
        background: var(--red);
        color: #fff;
        box-shadow: 0 10px 18px rgba(193, 18, 31, 0.18);
      }

      .btn.secondary {
        background: #fff;
        border-color: rgba(11, 61, 145, 0.25);
        color: var(--blue);
      }

      .note {
        margin-top: 18px;
        font-size: 14px;
        font-weight: 700;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .card {
          padding: 28px 18px;
        }

        p {
          font-size: 16px;
        }
      }
    </style>

    <!-- Google Tag Manager -->
    <script>
      (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
        var f = d.getElementsByTagName(s)[0],
          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-K52WZPK8");
    </script>
    <!-- End Google Tag Manager -->
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-K52WZPK8"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <main class="wrap">
      <section class="card" aria-label="Booking confirmation">
        <img class="logo" src="img/Plumbazing_logo.svg" alt="PlumbAZing logo" />

        <div class="eyebrow">Booking received</div>
        <h1>Thank you for booking.</h1>
        <p>
          We’ve received your request and will be in touch shortly to confirm
          the details.
        </p>

        <div class="actions">
          <a class="btn primary" href="/">Back to home</a>
          <a class="btn secondary" href="tel:+15128884406">Call/Text us</a>
        </div>

        <div class="note">PlumbAZing • Honest, reliable plumbing in Austin</div>
      </section>
    </main>
  </body>
</html>
